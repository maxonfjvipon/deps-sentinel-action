# yamllint disable rule:line-length
---
name: 'deps-sentinel-action'
description: 'Auto-merge dependency bot pull requests when CI is green'
branding:
  icon: git-merge
  color: green
inputs:
  token:
    description: 'Personal Access Token of the repository owner'
    required: true
  owner:
    description: 'GitHub handle to @mention when CI is failing'
    required: true
  bot-logins:
    description: 'Newline-separated list of dependency bot logins to watch'
    required: false
    default: |
      renovate[bot]
      dependabot[bot]
  merge-method:
    description: 'Merge method when not using Rultor: merge, squash, or rebase'
    required: false
    default: 'merge'
  rultor:
    description: 'Rultor usage: auto detects .rultor.yml, true forces it, false disables it'
    required: false
    default: 'auto'
  required-checks:
    description: 'Comma-separated check names that must pass; empty means all checks'
    required: false
    default: ''
  dry-run:
    description: 'Log actions without posting comments or merging'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        GITHUB_BOT_TOKEN: ${{ github.token }}
        INPUT_OWNER: ${{ inputs.owner }}
        INPUT_BOT_LOGINS: ${{ inputs.bot-logins }}
        INPUT_MERGE_METHOD: ${{ inputs.merge-method }}
        INPUT_RULTOR: ${{ inputs.rultor }}
        INPUT_REQUIRED_CHECKS: ${{ inputs.required-checks }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: bash "${{ github.action_path }}/src/run.sh"
